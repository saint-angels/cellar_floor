<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cellar Floor</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #14110f; color: #cfc9bf; font: 13px/1.4 ui-monospace, monospace; display: flex; height: 100dvh; overscroll-behavior: none; }
    #map { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; position: relative; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
    button, a, #side { touch-action: manipulation; }
    #map.zoomed canvas { cursor: grab; }
    #map.panning canvas { cursor: grabbing; }
    canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }
    #side { width: 320px; border-left: 1px solid #333; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8d857a; margin: 0 0 4px; }
    #timescale button { background: #262220; color: #cfc9bf; border: 1px solid #444; padding: 4px 10px; cursor: pointer; }
    #timescale button.active { background: #4a7c3f; color: #fff; }
    #timescale button.reset { border-color: #6a3a32; color: #d9724a; margin-left: 8px; }
    #torch-btn { background: #262220; color: #cfc9bf; border: 1px solid #444; padding: 4px 10px; cursor: pointer; margin-top: 6px; }
    #torch-btn.armed { background: #7a5a1e; color: #fff; }
    #torch-btn:disabled { opacity: 0.4; cursor: default; }
    #torch-error { color: #d9724a; min-height: 1em; }
    #goldicon { width: 12px; height: 14px; image-rendering: pixelated; vertical-align: -2px; }
    #debugmenu { position: absolute; top: 8px; left: 8px; display: none; background: rgba(20, 17, 15, 0.95); border: 1px solid #6a5a2e; padding: 10px 14px; z-index: 5; max-height: calc(100% - 24px); overflow-y: auto; }
    #debugmenu h2 { margin: 6px 0 4px; }
    #debugmenu .hint { color: #8d857a; text-transform: none; }
    #debugmenu button { background: #262220; color: #cfc9bf; border: 1px solid #444; padding: 3px 8px; cursor: pointer; margin: 2px 4px 2px 0; font: inherit; }
    #debug-claims .claim-row { display: flex; align-items: center; gap: 6px; padding: 1px 0; }
    #debug-claims .claim-row span.count { min-width: 2ch; text-align: right; }
    #debug-claims .claim-row span.name { flex: 1; }
    #levelbox { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    #levelbar { flex: 1; height: 10px; background: #1a1815; border: 1px solid #444; }
    #levelfill { height: 100%; width: 0%; background: #4a7c3f; }
    #claimcard { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); display: none; background: #1c1815; border: 1px solid #6a5a2e; padding: 12px 16px; text-align: center; max-width: min(340px, 92%); z-index: 4; }
    #offerbox button { display: block; width: 100%; box-sizing: border-box; background: #262220; color: #e8e2d8; border: 1px solid #6a5a2e; padding: 8px 14px; margin-top: 8px; cursor: pointer; font: inherit; text-align: left; }
    #offerbox button:hover { background: #33291c; }
    #offerbox button:disabled { opacity: 0.4; cursor: default; }
    #offerbox .kind { display: block; color: #8d857a; font-size: 0.85em; }
    #claimmore { color: #8d857a; margin-top: 4px; }
    #map.placing canvas { cursor: crosshair; }
    #mydwarf { white-space: pre-line; }
    #popup { position: absolute; display: none; background: rgba(20, 17, 15, 0.92); border: 1px solid #4a443c; padding: 6px 8px; white-space: pre; pointer-events: none; }
    #recap { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: none; background: rgba(20, 17, 15, 0.94); border: 1px solid #4a443c; padding: 10px 16px; cursor: pointer; max-width: 80%; }
    #overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(10, 8, 7, 0.72); z-index: 6; }
    #overlay-card { background: #1c1815; border: 1px solid #4a443c; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; width: 260px; }
    #overlay-card input { background: #262220; color: #cfc9bf; border: 1px solid #444; padding: 6px 8px; font: inherit; }
    #overlay-card button { background: #4a7c3f; color: #fff; border: none; padding: 8px 10px; cursor: pointer; font: inherit; }
    #overlay-error { color: #d9724a; min-height: 1em; }
    #watch-link { color: #8d857a; text-align: center; }
    #events { flex: 1; overflow-y: auto; min-height: 100px; }
    #events div { padding: 1px 0; border-bottom: 1px dotted #2a2a2a; }
    .pop-row { display: flex; align-items: center; gap: 8px; }
    .pop-row canvas { width: 120px; height: 24px; }
    /* narrow screens: the sidebar becomes a bottom sheet under the map */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      #map { min-height: 0; }
      /* the sheet opens on gold, torch, and the level bar; populations,
         your dwarf, and events sit below the fold behind its scroll */
      #side { width: auto; max-height: min(240px, 38dvh); border-left: none; border-top: 1px solid #333; }
      #goldbox { order: -1; }
    }
    /* thumb-sized controls on touch devices */
    @media (pointer: coarse) {
      body { font-size: 15px; }
      #timescale button, #torch-btn, #debugmenu button, #claimcard button, #spawn-btn { padding: 10px 16px; }
      #claim-btn { padding: 10px 22px; }
    }
  </style>
</head>
<body>
  <div id="map"><canvas id="canvas"></canvas><div id="popup"></div><div id="recap"></div>
    <div id="debugmenu">
      <h2>debug <span class="hint">(tab)</span></h2>
      <div id="timescale"><h2>Speed</h2></div>
      <div><h2>Gold</h2><button id="debug-gold10">+10 gold</button><button id="debug-gold100">+100 gold</button></div>
      <div><h2>Level</h2><button id="debug-level">complete level</button></div>
      <div><h2>Claims</h2><div id="debug-claims"></div></div>
    </div>
    <div id="claimcard"><div id="claimtext"></div><div id="offerbox"></div><div id="claimmore"></div></div>
    <div id="overlay">
      <div id="overlay-card">
        <h2 id="overlay-title">A dwarf awaits</h2>
        <p id="overlay-text"></p>
        <input id="player-name" maxlength="24" placeholder="your name" />
        <button id="spawn-btn">Spawn a dwarf</button>
        <div id="overlay-error"></div>
        <a id="watch-link" href="#">just watch</a>
      </div>
    </div>
  </div>
  <div id="side">
    <div><h2>Populations</h2><div id="pops"></div></div>
    <div id="goldbox"><h2>Gold</h2><div id="gold"><img id="goldicon" src="/coin.png" alt=""> <span id="goldnum">0</span></div>
      <button id="torch-btn" disabled>torch (1 gold)</button>
      <div id="levelbox"><span id="levellabel">Lv 0</span><div id="levelbar"><div id="levelfill"></div></div></div>
      <div id="torch-error"></div>
    </div>
    <div><h2>Your Dwarf</h2><div id="mydwarf">none</div></div>
    <div style="flex:1;display:flex;flex-direction:column;min-height:0">
      <h2>Events</h2><div id="events"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
