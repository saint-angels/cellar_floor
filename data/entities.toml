[type.mushroom]
name = "Mushroom"
kind = "flora"
color = "#c4b5d9"
cost = 1 # gold a player pays to plant one; the main way to steer dwarves
sense_radius = 8 # beacon: eaters sense this within 8 tiles, through rock — both catch range and dig depth
# no regrow: a mushroom is a consumable command token — eaten clean, it dies
# and its beacon with it. The worldgen starting patch is therefore finite.
produces = [{ resource = "mushroom", amount = 6, max = 6, regrow_days = 0 }]

[type.dwarf]
name = "Dwarf"
kind = "fauna"
color = "#d9a066"
light_radius = 2 # carries its own light; the world is otherwise dark
eats = ["mushroom", "meat"] # hunts rabbits for meat when hungry
bite_size = 2.0
stomach_size = 10.0
hunger_threshold = 4.0
stomach_drain_hours = 0.16666666666666666
starve_hours = 48
fear_radius = 0
cells_per_second = 1.0
wander_chance = 0.6
home_range = 0
lifespan_days = 58
mature_days = 6
repro_threshold = 9.0
repro_chance = 0.0
repro_cost = 5.0
pop_floor = 0
pop_cap = 10
decay_hours = 24
mine_damage = 1
carry_capacity = 3
social_size = 10
social_threshold = 4
social_radius = 3
social_drain_days = 0.013888888888888888
social_refill_hours = 0.05
# thought bubbles: first matching rule wins, order is priority
# conditions: starving, hungry, lonely, struck_gold, seen_recently, always
# placeholders in text: {gold} = gold in last 24h, {name} = last seen dwarf
thoughts = [
  { when = "starving",      text = "starving..." },
  { when = "hungry",        text = "hungry" },
  { when = "lonely",        text = "feeling lonely" },
  { when = "struck_gold",   text = "struck {gold} gold today!" },
  { when = "seen_recently", text = "seen {name} recently!" },
  { when = "hauling",       text = "off to market with my haul" },
  { when = "always",        text = "content" },
]

# Prey animal. Eats mushrooms (competing with dwarves) and yields meat when
# killed, so a hungry dwarf hunts the nearest rabbit, the rabbit flees within
# its fear radius, and the dwarf eats the corpse. pop_floor 0 and repro_chance
# 0 keep it debug-spawn-only: none appear unless placed from the debug panel.
[type.rabbit]
name = "Rabbit"
kind = "fauna"
color = "#e8e4dc"
eats = ["mushroom"]
sense_radius = 6 # prey scent: hunters sense the rabbit (alive or corpse) within 6 tiles
produces = [{ resource = "meat", amount = 4, max = 4, regrow_days = 0 }]
bite_size = 1.0
stomach_size = 6.0
hunger_threshold = 3.0
stomach_drain_hours = 0.3333333333333333
starve_hours = 24
fear_radius = 5
cells_per_second = 0.8 # slower than a dwarf (1.0) so a hungry dwarf runs it down
wander_chance = 0.25
home_range = 0
lifespan_days = 8
mature_days = 2
repro_threshold = 5.0
repro_chance = 0.0
repro_cost = 3.0
pop_floor = 0
pop_cap = 30
decay_hours = 2
thoughts = [
  { when = "hungry", text = "must find a mushroom" },
  { when = "always", text = "sniff sniff" },
]

[type.campfire]
name = "Campfire"
kind = "structure"
color = "#e25822"
light_radius = 3
lifespan_days = 0   # never burns out

[type.market]
name = "Market"
kind = "structure"
color = "#b8860b"
market = true
